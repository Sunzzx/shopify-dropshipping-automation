name: CI

on:
  push:
    branches:
      - main
      - clean-main
  pull_request:
    branches:
      - main
      - clean-main

permissions:
  contents: read
  pull-requests: write

jobs:
  theme-check:
    name: Theme Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Theme Check
        uses: shopify/theme-check-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
