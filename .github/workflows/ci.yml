name: CI

# Trigger on push and pull requests to clean-main branch
on:
  push:
    branches:
      - clean-main
  pull_request:
    branches:
      - clean-main

permissions:
  contents: read
  pull-requests: write

jobs:
  theme-check:
    name: Theme Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify lock file exists
        run: |
          echo "Checking for lock files..."
          echo "Current working directory: $(pwd)"
          echo "Directory contents:"
          ls -la
          echo "Looking for package files:"
          find . -name "package*.json" -type f
          echo "Checking if package-lock.json exists:"
          if [ -f "package-lock.json" ]; then
            echo "✅ package-lock.json found!"
            echo "File size: $(ls -lh package-lock.json)"
            echo "First few lines:"
            head -5 package-lock.json
          else
            echo "❌ package-lock.json not found"
          fi
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          # Cache disabled until lock file issue is resolved
          
      - name: Install dependencies
        run: npm ci
        
      - name: Theme Check
        uses: shopify/theme-check-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
